<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нұралиге ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe5ec;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.2);
            z-index: 10;
            max-width: 380px;
            width: 95%;
            border: 1px solid white;
        }

        .love-is-img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        h1 { font-size: 2.2rem; font-weight: 900; color: #ff4d6d; }

        .timer-box {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .t-num { font-size: 1.3rem; font-weight: 900; color: #333; display: block; }
        .t-lab { font-size: 0.65rem; color: #ff4d6d; font-weight: 700; }

        .btns { display: flex; justify-content: center; gap: 15px; height: 50px; position: relative; }

        button {
            padding: 0 35px;
            border-radius: 15px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn { background: #ff4d6d; color: white; }
        #noBtn { background: #eee; color: #999; position: absolute; }

        /* ШКАЛА СТИЛІ */
        .meter-container { margin: 25px 0; }
        #love-slider {
            width: 100%;
            cursor: pointer;
            accent-color: #ff4d6d;
        }
        .percentage { font-weight: 900; color: #ff4d6d; font-size: 3rem; margin-bottom: 10px; }

        /* САНДЫҚ */
        #chest-container {
            font-size: 80px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            margin: 20px 0;
        }

        .hidden { display: none !important; }

        #finalContent h2 { color: #ff4d6d; font-size: 1.8rem; font-weight: 900; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="quiz">
            <img src="https://loveis.site/wp-content/uploads/2022/09/17.png" class="love-is-img">
            <h1>НҰРАЛИ ❤️</h1>
            
            <div class="timer-box">
                <div><span class="t-num" id="days">7</span><span class="t-lab">КҮН</span></div>
                <div><span class="t-num" id="hours">0</span><span class="t-lab">САҒАТ</span></div>
                <div><span class="t-num" id="mins">0</span><span class="t-lab">МИН</span></div>
                <div><span class="t-num" id="secs">0</span><span class="t-lab">СЕК</span></div>
            </div>

            <p style="margin-bottom: 20px; font-weight: 700; color: #555;">Мені жақсы көресің бе?</p>
            
            <div class="btns">
                <button id="yesBtn">ИӘ</button>
                <button id="noBtn">Жоқ</button>
            </div>
        </div>

        <div id="meter-screen" class="hidden">
            <div class="percentage" id="love-val">0%</div>
            <div class="meter-container">
                <input type="range" id="love-slider" min="0" max="100" value="0">
            </div>
            <p style="font-size: 0.9rem; font-weight: 700; color: #ff758f; letter-spacing: 1px;">ЖЕТКІЗ...</p>
        </div>

        <div id="chest-screen" class="hidden">
            <div id="chest-container">📦</div>
            <p id="click-hint" style="font-weight: 700; color: #ff758f; margin-top: 10px;">БАС...</p>
        </div>

        <div id="finalContent" class="hidden">
            <img src="https://loveis.site/wp-content/uploads/2022/09/14.png" class="love-is-img">
            <h2>Мен де сені жақсы көремін! ❤️</h2>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Таймер
        const start = new Date(new Date().getTime() - (7 * 24 * 60 * 60 * 1000));
        function updateTimer() {
            const diff = new Date() - start;
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById('mins').innerText = Math.floor((diff / 60000) % 60);
            document.getElementById('secs').innerText = Math.floor((diff / 1000) % 60);
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const slider = document.getElementById('love-slider');
        const chest = document.getElementById('chest-container');
        
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            noBtn.style.position = 'fixed';
        });

        yesBtn.addEventListener('click', () => {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('meter-screen').classList.remove('hidden');
        });

        slider.addEventListener('input', () => {
            let val = slider.value;
            document.getElementById('love-val').innerText = val + '%';
            if (val == 100) {
                setTimeout(() => {
                    document.getElementById('meter-screen').classList.add('hidden');
                    document.getElementById('chest-screen').classList.remove('hidden');
                    confetti({ particleCount: 60, spread: 70, origin: { y: 0.6 } });
                }, 400);
            }
        });

        let clickCount = 0;
        let scale = 1;
        chest.addEventListener('click', () => {
            clickCount++;
            scale += 0.3;
            chest.style.transform = `scale(${scale})`;
            confetti({ particleCount: 15, spread: 40, origin: { y: 0.5 } });

            if (clickCount >= 5) {
                document.getElementById('chest-screen').classList.add('hidden');
                document.getElementById('finalContent').classList.remove('hidden');
                
                var duration = 4 * 1000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4d6d', '#ffffff'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4d6d', '#ffffff'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }
        });
    </script>
</body>
</html>
